name: Extreme Space Saving - Raw Split

on:
  workflow_dispatch:

jobs:
  split-raw:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          # 1. 极限清理：把所有能删的预装软件全删了，腾出约 30GB 纯净空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
          sudo docker image prune -a -f
          
      - name: Pull and Split Raw (Direct Pipe)
        run: |
          # 2. 拉取镜像
          docker pull dexmal/dexbotic_benchmark:latest
          
          # 3. 创建存放目录
          mkdir -p ./splits
          
          # 4. 核心：直接导出并切片
          # 去掉 gzip 环节，减少 CPU 和内存缓冲区压力
          # split 会在每攒够 3GB 数据时才往磁盘写一个小文件
          docker save dexmal/dexbotic_benchmark:latest | split -b 3G - ./splits/dexbotic.tar.part_
          
          # 检查最后磁盘状态
          df -h
          
      - name: Upload Artifact
        if: always() # 哪怕中途空间爆了，也把已经切好的部分传上来，方便分析
        uses: actions/upload-artifact@v4
        with:
          name: dexbotic-raw-chunks
          path: ./splits/
          retention-days: 1
